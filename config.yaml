# QMD Vector Memory System Configuration
# QMD 向量记忆系统配置文件

# 向量数据库配置
vector_db:
  type: "chroma"  # 支持: chroma
  persist_directory: "D:/Agents/EVRMemory/data/qmd_memory"  # 向量库持久化目录

# Embedding 模型配置
embedding:
  model_name: "shibing624/text2vec-base-chinese"  # 中文语义匹配模型
  device: "cpu"  # 支持: cpu, cuda
  cache_folder: "D:/Agents/EVRMemory/models"  # 模型缓存目录（会自动解析 snapshot 路径）

# 记忆备份配置
backup:
  directory: "D:/Agents/EVRMemory/data/memory_backup"  # Markdown 原始备份目录
  format: "markdown"  # 备份格式

# RAG 配置
rag:
  top_k: 5  # 默认检索记忆条数
  min_similarity: 0.5  # 最小相似度阈值

# 日志配置
logging:
  level: "WARNING"  # 日志级别: DEBUG, INFO, WARNING, ERROR
  file: "D:/Agents/EVRMemory/logs/qmd.log"
