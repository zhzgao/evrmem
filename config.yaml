# QMD Vector Memory System Configuration
# QMD 向量记忆系统配置文件
#
# 说明：此文件为可选的自定义配置，不设置时将使用默认值。
# 默认数据目录：~/.evrmem/  （当前用户主目录下）
#
# 如需自定义路径，取消下方注释并修改为你自己的路径：

# 向量数据库配置
vector_db:
  type: "chroma"  # 支持: chroma
  # persist_directory: "/your/custom/path/data/qmd_memory"  # 自定义数据目录

# Embedding 模型配置
embedding:
  model_name: "shibing624/text2vec-base-chinese"  # 中文语义匹配模型
  device: "cpu"  # 支持: cpu, cuda
  # cache_folder: "/your/custom/path/models"  # 自定义模型缓存目录（不设置则用 ~/.evrmem/models）

# 记忆备份配置
backup:
  format: "markdown"  # 备份格式
  # directory: "/your/custom/path/data/memory_backup"  # 自定义备份目录

# RAG 配置
rag:
  top_k: 5  # 默认检索记忆条数
  min_similarity: 0.5  # 最小相似度阈值

# 日志配置
logging:
  level: "WARNING"  # 日志级别: DEBUG, INFO, WARNING, ERROR
  # file: "/your/custom/path/logs/qmd.log"  # 自定义日志文件路径
