site_name: evrmem - 本地化 AI 向量记忆系统
site_description: QMD - Fully Local AI Vector Memory System
site_url: https://zhzgao.github.io/evrmem
repo_name: zhzgao/evrmem
repo_url: https://github.com/zhzgao/evrmem

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang:
        - en
        - zh

nav:
  - 首页: index.md
  - 安装: install.md
  - 快速开始: quickstart.md
  - CLI 命令: cli.md
  - Python API: api.md
  - 配置: config.md
  - 开发指南: DEVELOPMENT.md
  - 更新日志: CHANGELOG.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.mark

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zhzgao/evrmem
